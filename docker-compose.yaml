services:
  redis:
    restart: always
    image: redis:8.4.2

  nginx:
    restart: always
    image: adithyashenal/milkflow-nginx
    # build:
    #   dockerfile: Dockerfile
    #   context: ./nginx
    # image: production-milkflow-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - api
      - frontend
    command: '/bin/sh -c ''while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g "daemon off;"'''

  certbot:
    image: certbot/certbot:v5.3.1
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    command: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  api:
    restart: unless-stopped
    image: adithyashenal/milkflow-api
    # build:
    #   dockerfile: Dockerfile
    #   context: ./Backend
    # image: production-milkflow-api
    env_file:
      - .env
    depends_on:
      - redis

  frontend:
    image: adithyashenal/milkflow-frontend
    # build:
    #   dockerfile: Dockerfile
    #   context: ./Frontend
    # image: production-milkflow-frontend
    environment:
      OSRM_URL: http://osrm:6000

  cvrp:
    image: adithyashenal/milkflow-cvrp
    # build:
    #   dockerfile: Dockerfile
    #   context: ./CVRP-service
    # image: production-milkflow-cvrp
    restart: always
    environment:
      OSRM_URL: http://osrm:6000

  osrm:
    image: adithyashenal/milkflow-osrm
    # build:
    #   dockerfile: Dockerfile.dev
    #   context: ./Osrm
    # image: production-milkflow-osrm
    container_name: osrm
    ports:
      - "6000:6000"
    volumes:
      - ./osrm/build:/build
