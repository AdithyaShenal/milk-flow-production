services:
  redis:
    image: redis:8.4.2
    ports:
      - "6379:6379"

  nginx:
    restart: always
    build:
      dockerfile: Dockerfile.dev
      context: ./nginx
    image: dev-milkflow-nginx
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/certs:/etc/nginx/certs
    ports:
      - "3050:80"
      - "5000:443"

  api:
    build:
      dockerfile: Dockerfile.dev
      context: ./Backend
    image: dev-milkflow-api
    env_file:
      - .env
    volumes:
      - /app/node_modules
      - ./Backend:/app
    depends_on:
      - redis

  frontend:
    build:
      dockerfile: Dockerfile.dev
      context: ./Frontend
    image: dev-milkflow-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./Frontend:/app
      - /app/node_modules
    environment:
      OSRM_URL: http://osrm:6000

  cvrp:
    build:
      dockerfile: Dockerfile
      context: ./CVRP-service
    image: dev-milkflow-cvrp
    environment:
      OSRM_URL: http://osrm:6000

  osrm:
    build:
      dockerfile: Dockerfile.dev
      context: ./Osrm
    image: dev-milkflow-osrm
    ports:
      - "6000:6000"
    volumes:
      - ./osrm/build:/build
